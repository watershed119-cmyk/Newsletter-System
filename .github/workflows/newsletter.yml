name: Water newsletter

on:
  workflow_dispatch:
    inputs:
      newsletter_type:
        description: Newsletter type to send
        required: true
        default: weekly
        type: choice
        options:
          - weekly
          - monthly
  schedule:
    - cron: "0 22 * * 0" # Monday 07:00 KST
    - cron: "0 22 28-31 * *" # Monthly candidate days (UTC), last-day check in app

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore newsletter state
        uses: actions/cache@v4
        with:
          path: .state
          key: water-newsletter-state-${{ github.run_id }}
          restore-keys: |
            water-newsletter-state-

      - name: Install app
        run: pip install ".[llm]"

      - name: Determine newsletter type
        id: type
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.newsletter_type }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 22 * * 0" ]; then
            echo "value=weekly" >> "$GITHUB_OUTPUT"
          else
            echo "value=monthly" >> "$GITHUB_OUTPUT"
          fi

      - name: Send newsletter
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STATE_FILE: .state/newsletter.json
        run: water-newsletter ${{ steps.type.outputs.value }}
